<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup - Secure Image</title>
  <style>
    /* --- Global Reset & Dark Theme --- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #121212; /* Very dark grey (almost black) */
      color: #e0e0e0; /* Light grey text */
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* --- Main Content Container --- */
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      flex-grow: 1;
      width: 100%;
    }

    /* --- Form Card --- */
    .form-card {
      background-color: #1e1e1e; /* Card background */
      border-radius: 8px;
      padding: 2.5rem;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
      animation: fadeIn 0.5s ease-out;
    }

    .form-card h2 {
      text-align: center;
      color: #007bff;
      margin-bottom: 2rem;
      font-size: 2rem;
    }

    /* --- Fade-in Animation --- */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* --- Form Inputs & Button --- */
    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      color: #b0b0b0;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }

    .form-input {
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      background-color: #2a2a2a;
      border: 1px solid #444;
      border-radius: 5px;
      color: #e0e0e0;
      transition: border-color 0.3s ease;
    }

    .form-input::placeholder {
      color: #777;
    }

    .form-input:focus {
      outline: none;
      border-color: #007bff;
    }

    .action-btn {
      width: 100%;
      padding: 0.75rem;
      font-size: 1rem;
      font-weight: bold;
      background-color: #007bff; 
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      margin-top: 1rem;
    }

    .action-btn:hover {
      background-color: #0056b3;
    }

    /* --- Footer Link --- */
    .footer-link {
      text-align: center;
      margin-top: 1.5rem;
      color: #b0b0b0;
    }

    .footer-link a {
      color: #007bff;
      text-decoration: none;
      font-weight: 500;
    }

    .footer-link a:hover {
      text-decoration: underline;
    }

    /* --- Footer --- */
    footer {
      text-align: center;
      padding: 2rem;
      background-color: #1e1e1e;
      color: #888;
      font-size: 0.9rem;
      width: 100%;
      margin-top: auto; /* Pushes footer to bottom */
    }

  </style>
</head>
<body>

  <!-- --- Main Content --- -->
  <div class="container">
    <div class="form-card">
      <h2>📝 Create Account</h2>
      <form action="signup.php" method="POST">
        
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" class="form-input" required>
        </div>
        
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" class="form-input" required>
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" class="form-input" required>
        </div>
        
        <button type="submit" class="action-btn">Sign Up</button>
      </form>

      <p class="footer-link">
        Already have an account?
        <a href="login.html">Login</a>
      </p>
    </div>
  </div>

  <!-- --- Footer --- -->
  <footer>
    <p>&copy; 2025 Secure Image. All rights reserved.</p>
  </footer>

</body>
</html>
