<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hide File - Secure Image</title>
  <style>
    /* --- Global Reset & Dark Theme --- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #121212; /* Very dark grey (almost black) */
      color: #e0e0e0; /* Light grey text */
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* --- Navbar --- */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 5%;
      background-color: #1e1e1e; /* Slightly lighter dark shade */
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
      width: 100%;
    }

    .navbar .logo {
      font-size: 1.5rem;
      font-weight: bold;
      color: #007bff; /* Accent color */
      text-decoration: none;
    }

    .nav-btn {
      padding: 0.5rem 1rem;
      font-size: 1rem;
      background-color: transparent;
      color: #007bff;
      border: 1px solid #007bff;
      border-radius: 5px;
      cursor: pointer;
      text-decoration: none;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .nav-btn:hover {
      background-color: #007bff;
      color: #ffffff;
    }

    /* --- Main Content Container --- */
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      flex-grow: 1;
      width: 100%;
    }

    .encrypt-card {
      background-color: #1e1e1e; /* Card background */
      border-radius: 8px;
      padding: 2.5rem;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
    }

    .encrypt-card h2 {
      text-align: center;
      color: #007bff;
      margin-bottom: 2rem;
      font-size: 2rem;
    }

    /* --- Form Inputs & Button --- */
    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      color: #b0b0b0;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }

    .form-input {
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      background-color: #2a2a2a;
      border: 1px solid #444;
      border-radius: 5px;
      color: #e0e0e0;
      transition: border-color 0.3s ease;
    }

    .form-input::placeholder {
      color: #777;
    }
    
    /* Style file input */
    .form-input[type="file"] {
      padding: 0.6rem 1rem;
      color: #999;
    }
    
    .form-input[type="file"]::file-selector-button {
      background-color: #007bff;
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 5px;
      cursor: pointer;
      margin-right: 1rem;
      transition: background-color 0.3s ease;
    }

    .form-input[type="file"]::file-selector-button:hover {
      background-color: #0056b3;
    }

    .form-input:focus {
      outline: none;
      border-color: #007bff;
    }

    .action-btn {
      width: 100%;
      padding: 0.75rem;
      font-size: 1rem;
      font-weight: bold;
      background-color: #007bff; /* Blue for "Encrypt/Hide" */
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s ease, opacity 0.3s ease;
      margin-top: 1rem;
    }

    .action-btn:hover {
      background-color: #0056b3;
    }
    
    .action-btn:disabled {
      background-color: #555;
      opacity: 0.7;
      cursor: not-allowed;
    }
    
    /* --- Status Message --- */
    #status {
      margin-top: 1.5rem;
      text-align: center;
      color: #28a745; /* Green for success */
      font-weight: bold;
      font-size: 1.1rem;
    }

    /* --- Footer --- */
    footer {
      text-align: center;
      padding: 2rem;
      background-color: #1e1e1e;
      color: #888;
      font-size: 0.9rem;
      width: 100%;
    }

    /* --- Custom Alert --- */
    .custom-alert-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      display: none; /* Hidden by default */
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    
    .custom-alert-box {
      background: #1e1e1e;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
      text-align: center;
      max-width: 400px;
      width: 90%;
    }

    .custom-alert-box p {
      color: #e0e0e0;
      font-size: 1.1rem;
      margin-bottom: 1.5rem;
    }

    .custom-alert-btn {
      padding: 0.6rem 1.5rem;
      font-size: 1rem;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .custom-alert-btn:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <!-- --- Navbar --- -->
  <nav class="navbar">
    <a href="dashboard.html" class="logo">🔐 Secure Image</a>
    <a href="dashboard.html" class="nav-btn">Back to Dashboard</a>
  </nav>

  <!-- --- Main Content --- -->
  <div class="container">
    <div class="encrypt-card">
      <h2>📁 Hide File Inside Image</h2>

      <div class="form-group">
        <label for="coverImage">1. Select Cover Image</label>
        <input type="file" id="coverImage" class="form-input" accept="image/*">
      </div>

      <div class="form-group">
        <label for="fileToHide">2. Select File to Hide</label>
        <input type="file" id="fileToHide" class="form-input">
      </div>

      <div class="form-group">
        <label for="fileKey">3. Encryption Key (Optional)</label>
        <input type="text" id="fileKey" class="form-input" placeholder="Enter secret key to encrypt the file">
      </div>
      
      <canvas id="canvas" style="display:none;"></canvas>
      <button onclick="hideFileInImage()" class="action-btn">Hide File & Download Image</button>

      <p id="status"></p>
    </div>
  </div>

  <!-- --- Footer --- -->
  <footer>
    <p>&copy; 2025 Secure Image. All rights reserved.</p>
  </footer>

  <!-- --- Custom Alert Box --- -->
  <div class="custom-alert-overlay" id="customAlertOverlay">
    <div class="custom-alert-box">
      <p id="customAlertMessage"></p>
      <button class="custom-alert-btn" onclick="closeCustomAlert()">OK</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

  <!-- 
    This is the exact script you provided, with alert() 
    calls replaced by showCustomAlert() and button 
    loading state added for better UX.
  -->
  <script>
    // --- Custom Alert Functions ---
    const alertOverlay = document.getElementById('customAlertOverlay');
    const alertMessage = document.getElementById('customAlertMessage');

    function showCustomAlert(message) {
      alertMessage.textContent = message;
      alertOverlay.style.display = "flex";
    }

    function closeCustomAlert() {
      alertOverlay.style.display = "none";
    }

    // --- Steganography Logic (from your request) ---

    // Convert string to binary
    function stringToBinary(str) {
      return str.split('').map(c => c.charCodeAt(0).toString(2).padStart(8, '0')).join('');
    }

    // Convert bytes to binary string
    function bytesToBinary(bytes) {
      return Array.from(bytes).map(b => b.toString(2).padStart(8, '0')).join('');
    }

    function hideFileInImage() {
      const coverImage = document.getElementById('coverImage');
      const fileToHide = document.getElementById('fileToHide');
      const key = document.getElementById('fileKey').value.trim();
      const status = document.getElementById('status');
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const button = document.querySelector('.action-btn');

      status.textContent = ""; // Clear status

      if (!coverImage.files.length || !fileToHide.files.length) {
        showCustomAlert("Please select both an image and a file to hide!"); // Replaced alert()
        return;
      }

      button.disabled = true;
      button.textContent = "Processing...";

      const img = new Image();
      const reader = new FileReader();

      reader.onload = function(e) {
        try {
          const fileBytes = new Uint8Array(e.target.result);
          let fileBinary;

          // Convert to base64
          let base64File = btoa(String.fromCharCode(...fileBytes));

          // Encrypt if key provided
          if (key) {
            const encrypted = CryptoJS.AES.encrypt(base64File, key).toString();
            fileBinary = stringToBinary(encrypted);
          } else {
            fileBinary = stringToBinary(base64File);
          }

          // Metadata header
          const metadata = `FILE:${fileToHide.files[0].name}|${fileBytes.length}|ENDMETA|`;
          const metadataBinary = stringToBinary(metadata);
          const fullBinaryData = metadataBinary + fileBinary;

          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const data = imageData.data;

          const totalCapacity = Math.floor((data.length / 4) * 3); // 3 bits per pixel

          if (fullBinaryData.length > totalCapacity) {
            showCustomAlert("❌ File is too large for this image. Try using a larger image or smaller file."); // Replaced alert()
            button.disabled = false;
            button.textContent = "Hide File & Download Image";
            return;
          }
          
          if (fullBinaryData.length > totalCapacity * 0.9) {
             console.warn("Warning: File size is very close to image capacity. This may be slow.");
             status.textContent = "Embedding large file... please wait.";
          }

          // Embed binary data into pixels (LSB)
          let dataIndex = 0;
          for (let i = 0; i < data.length && dataIndex < fullBinaryData.length; i += 4) {
            data[i]     = (data[i] & 0xFE) | parseInt(fullBinaryData[dataIndex++] || 0);
            if (dataIndex >= fullBinaryData.length) break; // Check after each bit
            data[i + 1] = (data[i + 1] & 0xFE) | parseInt(fullBinaryData[dataIndex++] || 0);
            if (dataIndex >= fullBinaryData.length) break; // Check after each bit
            data[i + 2] = (data[i + 2] & 0xFE) | parseInt(fullBinaryData[dataIndex++] || 0);
          }

          ctx.putImageData(imageData, 0, 0);

          // Download final stego image
          const link = document.createElement("a");
          link.href = canvas.toDataURL("image/png");
          link.download = "stego_image.png";
          link.click();
          URL.revokeObjectURL(link.href); // Clean up

          status.textContent = "✅ File successfully hidden and image downloaded!";
        } catch (e) {
            console.error("An error occurred during file hiding:", e);
            showCustomAlert("An unexpected error occurred: " + e.message);
        } finally {
            button.disabled = false;
            button.textContent = "Hide File & Download Image";
        }
      };
      
      img.onload = function() {
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);
        // Now that the image is loaded and drawn, read the file
        reader.readAsArrayBuffer(fileToHide.files[0]);
      };
      
      img.onerror = function() {
         showCustomAlert("Error: Could not load the selected cover image. Please ensure it's a valid image.");
         button.disabled = false;
         button.textContent = "Hide File & Download Image";
      }
      
      // Start the image loading process
      img.src = URL.createObjectURL(coverImage.files[0]);
    }
  </script>
</body>
</html>
